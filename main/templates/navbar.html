<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<nav class="w-full bg-white border-b border-stone-100 px-6 py-4" style="font-family: 'DM Sans', sans-serif;">
  <div class="max-w-2xl mx-auto flex items-center justify-between">

    <!-- Logo / Brand -->
    <a href="/" class="flex items-center gap-2 no-underline">
      <div class="w-7 h-7 rounded-lg bg-stone-800 flex items-center justify-center">
        <span class="text-white text-[11px]" style="font-family:'DM Serif Display',serif;font-style:italic;">K4</span>
      </div>
      <span class="text-[15px] font-medium text-stone-800 tracking-tight">Kelompok 4</span>
    </a>

    <!-- Nav Links (desktop) -->
    <div class="hidden sm:flex items-center gap-6">
      <a href="/" class="nav-link text-[13px] text-stone-400 hover:text-stone-700 transition-colors no-underline" data-path="/">Beranda</a>
      <a href="/auth/font" class="nav-link text-[13px] text-stone-400 hover:text-stone-700 transition-colors no-underline" data-path="/font">Font</a>
      <a href="/auth/warna" class="nav-link text-[13px] text-stone-400 hover:text-stone-700 transition-colors no-underline" data-path="/warna">Warna</a>
      <a href="/auth/login" class="nav-link text-[13px] text-stone-400 hover:text-stone-700 transition-colors no-underline" data-path="/logout">Akun</a>
    </div>

    <!-- Mobile Hamburger -->
    <button
      onclick="document.getElementById('mobile-menu').classList.toggle('hidden')"
      class="sm:hidden w-8 h-8 flex flex-col items-center justify-center gap-1.5 rounded-lg hover:bg-stone-50 transition-colors"
      aria-label="Toggle menu"
    >
      <span class="w-4 h-px bg-stone-700 block"></span>
      <span class="w-4 h-px bg-stone-700 block"></span>
      <span class="w-3 h-px bg-stone-700 block self-end"></span>
    </button>

  </div>

  <!-- Mobile Menu -->
  <div id="mobile-menu" class="hidden sm:hidden max-w-lg mx-auto pt-4 pb-2 flex flex-col gap-1">
    <a href="/" class="nav-link-mobile text-[13px] text-stone-500 px-2 py-2 rounded-lg hover:bg-stone-50 transition-colors no-underline" data-path="/">Beranda</a>
    <a href="/auth/font" class="nav-link-mobile text-[13px] text-stone-500 px-2 py-2 rounded-lg hover:bg-stone-50 transition-colors no-underline" data-path="/font">Font</a>
    <a href="/auth/warna" class="nav-link-mobile text-[13px] text-stone-500 px-2 py-2 rounded-lg hover:bg-stone-50 transition-colors no-underline" data-path="/warna">Warna</a>
    <a href="/auth/login" class="nav-link-mobile text-[13px] text-red-400 px-2 py-2 rounded-lg hover:bg-red-50 transition-colors no-underline" data-path="/logout">Logout</a>
  </div>
</nav>

<script>
  // Function to set active nav link
  function setActiveNavLink() {
    // Get current path without trailing slash
    let currentPath = window.location.pathname;
    
    // Remove trailing slash for comparison (except for root)
    if (currentPath !== '/' && currentPath.endsWith('/')) {
      currentPath = currentPath.slice(0, -1);
    }
    
    // Desktop nav links
    const desktopLinks = document.querySelectorAll('.nav-link');
    desktopLinks.forEach(link => {
      let linkPath = link.getAttribute('data-path');
      
      // Remove trailing slash from linkPath too
      if (linkPath !== '/' && linkPath.endsWith('/')) {
        linkPath = linkPath.slice(0, -1);
      }
      
      const isActive = currentPath === linkPath;
      
      if (isActive) {
        // Active state
        link.classList.remove('text-stone-400', 'hover:text-stone-700');
        link.classList.add('text-stone-800', 'font-medium', 'border-b', 'border-stone-800', 'pb-0.5');
      } else {
        // Inactive state
        link.classList.remove('text-stone-800', 'font-medium', 'border-b', 'border-stone-800', 'pb-0.5');
        link.classList.add('text-stone-400', 'hover:text-stone-700');
      }
    });
    
    // Mobile nav links
    const mobileLinks = document.querySelectorAll('.nav-link-mobile');
    mobileLinks.forEach(link => {
      let linkPath = link.getAttribute('data-path');
      
      // Remove trailing slash from linkPath too
      if (linkPath !== '/' && linkPath.endsWith('/')) {
        linkPath = linkPath.slice(0, -1);
      }
      
      const isActive = currentPath === linkPath;
      
      if (isActive) {
        // Active state
        link.classList.remove('text-stone-500', 'text-red-400');
        link.classList.add('text-stone-800', 'font-medium', 'bg-stone-50');
      } else {
        // Inactive state
        link.classList.remove('text-stone-800', 'font-medium', 'bg-stone-50');
        if (linkPath === '/logout') {
          link.classList.add('text-red-400');
        } else {
          link.classList.add('text-stone-500');
        }
      }
    });
  }
  
  // Set active link on page load
  document.addEventListener('DOMContentLoaded', setActiveNavLink);
  
  // Also update when back/forward buttons are used
  window.addEventListener('popstate', setActiveNavLink);
</script>
