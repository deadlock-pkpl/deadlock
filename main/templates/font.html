{% extends 'base.html' %}
{% block title %}Pilih Font{% endblock %}
{% block content %}
{% include 'navbar.html' %}

<!-- Memuat Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script&family=Playfair+Display&family=Montserrat&family=Lora&family=Oswald&family=Raleway&family=Merriweather&family=Poppins&family=Ubuntu&family=Cinzel&family=Caveat&family=Abril+Fatface&display=swap" rel="stylesheet">

<main class="theme-main min-h-screen py-16 px-4">
  <div class="max-w-2xl mx-auto text-center mb-12">
    <h1 class="text-4xl text-stone-800 mb-2" style="font-family: 'DM Serif Display', serif;">Pilih Font</h1>
    <p class="text-sm text-stone-400">Klik pada kotak untuk mengubah font seluruh website</p>
  </div>

  <div class="max-w-3xl mx-auto grid grid-cols-2 md:grid-cols-3 gap-4">
    <!-- Daftar Font -->
    <button onclick="setFont('\'Poppins\', sans-serif')" class="p-6 bg-white border border-stone-200 rounded-xl hover:border-stone-800 transition-all text-center">
      <span style="font-family: 'Poppins', sans-serif;">Poppins</span>
    </button>
    <button onclick="setFont('\'Playfair Display\', serif')" class="p-6 bg-white border border-stone-200 rounded-xl hover:border-stone-800 transition-all text-center">
      <span style="font-family: 'Playfair Display', serif;">Playfair Display</span>
    </button>
    <button onclick="setFont('\'Dancing Script\', cursive')" class="p-6 bg-white border border-stone-200 rounded-xl hover:border-stone-800 transition-all text-center">
      <span style="font-family: 'Dancing Script', cursive;">Dancing Script</span>
    </button>
    <button onclick="setFont('\'Montserrat\', sans-serif')" class="p-6 bg-white border border-stone-200 rounded-xl hover:border-stone-800 transition-all text-center">
      <span style="font-family: 'Montserrat', sans-serif;">Montserrat</span>
    </button>
    <button onclick="setFont('\'Caveat\', cursive')" class="p-6 bg-white border border-stone-200 rounded-xl hover:border-stone-800 transition-all text-center">
      <span style="font-family: 'Caveat', cursive;">Caveat</span>
    </button>
    <button onclick="setFont('\'Oswald\', sans-serif')" class="p-6 bg-white border border-stone-200 rounded-xl hover:border-stone-800 transition-all text-center">
      <span style="font-family: 'Oswald', sans-serif;">Oswald</span>
    </button>
    <!-- Tambahkan button lain dengan format yang sama sampai 12 -->
  </div>

  <div class="text-center mt-12">
    <button onclick="resetSettings()" class="text-xs text-stone-400 underline uppercase tracking-widest">Reset Font</button>
  </div>
</main>

<script>
  function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
      const cookies = document.cookie.split(';');
      for (let cookie of cookies) {
        cookie = cookie.trim();
        if (cookie.startsWith(name + '=')) {
          cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
          break;
        }
      }
    }
    return cookieValue;
  }

  async function setFont(fontName) {
    const res = await fetch("{% url 'main:save_theme' %}", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "X-CSRFToken": getCookie("csrftoken"),
      },
      body: JSON.stringify({
        font_family: fontName
      })
    });

    const data = await res.json();

    if (!res.ok) {
      alert(data.message || "Gagal menyimpan font");
      return;
    }

    document.body.style.fontFamily = data.font_family;
  }

  async function resetSettings() {
    const res = await fetch("{% url 'main:save_theme' %}", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "X-CSRFToken": getCookie("csrftoken"),
      },
      body: JSON.stringify({
        font_family: "'DM Sans', sans-serif"
      })
    });

    const data = await res.json();

    if (!res.ok) {
      alert(data.message || "Gagal reset font");
      return;
    }

    location.reload();
  }
</script>
{% include 'footer.html' %}
{% endblock %}
