{% extends 'base.html' %}
{% block title %}Pilih Warna{% endblock %}
{% block content %}
{% include 'navbar.html' %}

<main class="min-h-screen bg-stone-50 py-16 px-4 transition-colors duration-500">
  <!-- Page Header -->
  <div class="max-w-2xl mx-auto text-center mb-12">
    <p class="text-xs tracking-widest uppercase text-stone-400 mb-2">Kelompok Deadlock · 2026</p>
    <h1 class="text-4xl text-stone-800 mb-2" style="font-family: 'DM Serif Display', serif; font-weight: 400;">
      Pilih Warna
    </h1>
    <p class="text-sm text-stone-400">Warna dengan border hitam adalah tema yang sedang aktif</p>
    <div class="w-10 h-px bg-stone-300 mx-auto mt-4"></div>
  </div>

  <!-- Palette Warna Grid -->
  <div class="max-w-3xl mx-auto grid grid-cols-2 sm:grid-cols-4 gap-6">
    
    
    <!-- Warna 1 -->
    <button onclick="setColor('#fecdd3', 'Blush Rose')" data-hex="#fecdd3" class="color-card group flex flex-col items-center gap-3 p-4 bg-white border-2 border-stone-100 rounded-2xl hover:shadow-md transition-all">
      <div class="w-16 h-16 rounded-full border-4 border-white shadow-sm ring-2 ring-rose-200 bg-[#fecdd3]"></div>
      <span class="text-xs font-semibold text-stone-600 uppercase tracking-wider">Blush Rose</span>
    </button>

    <!-- Warna 2 -->
    <button onclick="setColor('#fde68a', 'Golden Amber')" data-hex="#fde68a" class="color-card group flex flex-col items-center gap-3 p-4 bg-white border-2 border-stone-100 rounded-2xl hover:shadow-md transition-all">
      <div class="w-16 h-16 rounded-full border-4 border-white shadow-sm ring-2 ring-amber-200 bg-[#fde68a]"></div>
      <span class="text-xs font-semibold text-stone-600 uppercase tracking-wider">Golden Amber</span>
    </button>

    <!-- Warna 3 -->
    <button onclick="setColor('#a7f3d0', 'Fresh Mint')" data-hex="#a7f3d0" class="color-card group flex flex-col items-center gap-3 p-4 bg-white border-2 border-stone-100 rounded-2xl hover:shadow-md transition-all">
      <div class="w-16 h-16 rounded-full border-4 border-white shadow-sm ring-2 ring-emerald-200 bg-[#a7f3d0]"></div>
      <span class="text-xs font-semibold text-stone-600 uppercase tracking-wider">Fresh Mint</span>
    </button>

    <!-- Warna 4 -->
    <button onclick="setColor('#bae6fd', 'Ocean Sky')" data-hex="#bae6fd" class="color-card group flex flex-col items-center gap-3 p-4 bg-white border-2 border-stone-100 rounded-2xl hover:shadow-md transition-all">
      <div class="w-16 h-16 rounded-full border-4 border-white shadow-sm ring-2 ring-sky-200 bg-[#bae6fd]"></div>
      <span class="text-xs font-semibold text-stone-600 uppercase tracking-wider">Ocean Sky</span>
    </button>

    <!-- Warna 5 -->
    <button onclick="setColor('#c7d2fe', 'Royal Indigo')" data-hex="#c7d2fe" class="color-card group flex flex-col items-center gap-3 p-4 bg-white border-2 border-stone-100 rounded-2xl hover:shadow-md transition-all">
      <div class="w-16 h-16 rounded-full border-4 border-white shadow-sm ring-2 ring-indigo-200 bg-[#c7d2fe]"></div>
      <span class="text-xs font-semibold text-stone-600 uppercase tracking-wider">Royal Indigo</span>
    </button>

    <!-- Warna 6 -->
    <button onclick="setColor('#ddd6fe', 'Soft Violet')" data-hex="#ddd6fe" class="color-card group flex flex-col items-center gap-3 p-4 bg-white border-2 border-stone-100 rounded-2xl hover:shadow-md transition-all">
      <div class="w-16 h-16 rounded-full border-4 border-white shadow-sm ring-2 ring-violet-200 bg-[#ddd6fe]"></div>
      <span class="text-xs font-semibold text-stone-600 uppercase tracking-wider">Soft Violet</span>
    </button>

    <!-- Warna 7 -->
    <button onclick="setColor('#e2e8f0', 'Steel Slate')" data-hex="#e2e8f0" class="color-card group flex flex-col items-center gap-3 p-4 bg-white border-2 border-stone-100 rounded-2xl hover:shadow-md transition-all">
      <div class="w-16 h-16 rounded-full border-4 border-white shadow-sm ring-2 ring-slate-200 bg-[#e2e8f0]"></div>
      <span class="text-xs font-semibold text-stone-600 uppercase tracking-wider">Steel Slate</span>
    </button>

    <!-- Warna 8: Default -->
    <button onclick="resetColor()" data-hex="reset" class="color-card group flex flex-col items-center gap-3 p-4 bg-white border-2 border-stone-100 rounded-2xl hover:shadow-md transition-all">
      <div class="w-16 h-16 rounded-full border-4 border-white shadow-sm ring-2 ring-stone-200 bg-[#fafaf9]"></div>
      <span class="text-xs font-bold text-stone-800 uppercase tracking-wider">Default</span>
    </button>

  </div>

  <div id="statusMsg" class="text-center mt-12 text-sm text-stone-500 font-medium h-5 transition-opacity duration-300"></div>

</main>

<script>
  // Fungsi untuk memperbarui tampilan border tombol yang aktif
  function updateActiveButtonBorder(selectedHex) {
    const allCards = document.querySelectorAll('.color-card');
    
    allCards.forEach(card => {
      const cardHex = card.getAttribute('data-hex');
      
      if (cardHex === selectedHex) {
        // Jika ini tombol yang dipilih, tebalkan bordernya
        card.classList.remove('border-stone-100');
        card.classList.add('border-stone-800', 'ring-1', 'ring-stone-800');
      } else {
        // Jika bukan, kembalikan ke border tipis
        card.classList.remove('border-stone-800', 'ring-1', 'ring-stone-800');
        card.classList.add('border-stone-100');
      }
    });
  }

  function setColor(hex, name) {
    // 1. Terapkan warna ke main
    const mainArea = document.querySelector('main');
    if (mainArea) {
      mainArea.style.backgroundColor = hex;
      mainArea.classList.remove('bg-stone-50');
    }
    
    // 2. Simpan ke Memori Browser
    localStorage.setItem('selectedColor', hex);
    
    // 3. Update Border Tombol
    updateActiveButtonBorder(hex);

    // 4. Feedback Message
    const statusMsg = document.getElementById('statusMsg');
    statusMsg.innerText = "Tema " + name + " diterapkan";
    statusMsg.style.opacity = "1";
    setTimeout(() => { statusMsg.style.opacity = "0"; }, 2000);
  }

  function resetColor() {
    localStorage.removeItem('selectedColor');
    // Berikan parameter reset agar border balik ke tombol default
    updateActiveButtonBorder('reset');
    location.reload();
  }

  // SAAT HALAMAN DIBUKA: Cek warna mana yang sedang aktif
  document.addEventListener('DOMContentLoaded', () => {
    const savedColor = localStorage.getItem('selectedColor');
    if (savedColor) {
      updateActiveButtonBorder(savedColor);
    } else {
      updateActiveButtonBorder('reset');
    }
  });
</script>

{% include 'footer.html' %}
{% endblock %}
